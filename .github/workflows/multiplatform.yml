name: Multi-platform Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:

  # ── Fedora (latest) ───────────────────────────────────────────────
  fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc make autoconf automake libtool pkgconf-pkg-config \
            gtk4-devel glib2-devel \
            gnutls-devel gnutls-utils openssl \
            sqlite sqlite-devel libgcrypt-devel readline-devel \
            gdk-pixbuf2-devel \
            gettext-devel intltool iso-codes-devel \
            weston dbus-daemon dbus-tools git \
            rpm-build tar gzip

      - name: Set up D-Bus machine-id
        run: dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make install

      - name: Run CLI tests
        run: |
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Run GUI workflow tests (headless Wayland)
        run: |
          dbus-run-session -- make check TESTS="check_ui_consistency check_workflows.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build source tarball
        if: steps.version.outputs.is_release == 'true'
        run: make dist

      - name: Build RPM
        if: steps.version.outputs.is_release == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          cp "gnomint-${version}.tar.gz" ~/rpmbuild/SOURCES/
          cp gnomint.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/gnomint.spec
          cp ~/rpmbuild/RPMS/x86_64/gnomint-*.rpm .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-fedora
          path: |
            gnomint-${{ steps.version.outputs.version }}.tar.gz
            gnomint-*.rpm

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-fedora
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Debian / Ubuntu ──────────────────────────────────────────────
  debian:
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            gcc make autoconf automake libtool pkg-config intltool \
            libgtk-4-dev libglib2.0-dev \
            libgnutls28-dev gnutls-bin openssl \
            libsqlite3-dev sqlite3 libgcrypt20-dev libreadline-dev \
            libgdk-pixbuf-2.0-dev \
            gettext iso-codes \
            dpkg-dev debhelper fakeroot lintian \
            weston dbus dbus-x11 git ca-certificates

      - name: Set up D-Bus machine-id
        run: dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${GITHUB_REF#refs/tags/v}" != "$GITHUB_REF" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make install

      - name: Run CLI tests
        run: |
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build .deb package
        if: steps.version.outputs.is_release == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p debian/source
          cp packaging/debian/control debian/
          cp packaging/debian/rules debian/
          cp packaging/debian/source/format debian/source/
          chmod +x debian/rules
          sed -e "s/@PACKAGE_VERSION@/${version}/g" \
              -e "s/@BUILD_DATE@/$(date -R)/g" \
              packaging/debian/changelog.in > debian/changelog
          dpkg-buildpackage -us -uc -b
          cp ../*.deb .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-debian
          path: gnomint_*.deb

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-debian
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Debian/Ubuntu i386 (32-bit, multilib) ─────────────────────────
  # Builds gnoMint as a 32-bit binary against the i386 multiarch libraries,
  # which — like the distribution — keep a 32-bit time_t. This guards the
  # whole Year-2038 story on the one architecture where it bites: the issue
  # #86 GnuTLS ABI fix, the warn-and-clamp on certificate generation, and the
  # 64-bit display layer that must still show post-2038 dates stored in the
  # database (check_cli_y2038.sh). No chroot/qemu: the i386 ELF runs natively
  # on the amd64 kernel, so the test binaries execute directly. check_y2k38
  # is expected to SKIP here (it reports the 2038 limit honestly on 32-bit
  # time_t); check_cli_y2038.sh must PASS, proving the database date survives.
  i386:
    runs-on: ubuntu-latest
    steps:
      - name: Enable i386 multiarch and install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc gcc-multilib make autoconf automake libtool pkg-config intltool \
            gettext autopoint iso-codes openssl gnutls-bin dbus dbus-x11 file sqlite3 \
            libgtk-4-dev:i386 libglib2.0-dev:i386 \
            libgnutls28-dev:i386 libsqlite3-dev:i386 \
            libgcrypt20-dev:i386 libreadline-dev:i386 \
            libgdk-pixbuf-2.0-dev:i386

      - name: Set up D-Bus machine-id
        run: sudo dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate build configuration
        run: NOCONFIGURE=1 ./autogen.sh

      - name: Configure (32-bit / i386 multilib)
        env:
          CC: "gcc -m32"
          PKG_CONFIG_LIBDIR: "/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        run: ./configure --enable-debug

      - name: Build
        run: make -j$(nproc)

      - name: Verify the binaries are really 32-bit
        run: |
          file src/gnomint-cli src/gnomint
          file src/gnomint-cli | grep -q "ELF 32-bit" \
            || (echo "ERROR: expected a 32-bit i386 binary"; exit 1)

      - name: Install
        run: sudo make install

      - name: Run CLI tests (incl. Year-2038 correctness)
        run: |
          export GSETTINGS_SCHEMA_DIR=/usr/local/share/glib-2.0/schemas
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-i386
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Arch Linux (rolling) ──────────────────────────────────────────
  arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            gcc make autoconf automake libtool pkgconf \
            gtk4 glib2 \
            gnutls openssl \
            sqlite libgcrypt readline \
            gdk-pixbuf2 \
            gettext intltool iso-codes \
            weston libdisplay-info dbus python git \
            fakeroot debugedit

      - name: Set up D-Bus machine-id
        run: dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure --prefix=/usr

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make install

      - name: Run CLI tests
        run: |
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Run GUI workflow tests (headless Wayland)
        run: |
          export XDG_RUNTIME_DIR=$(mktemp -d)
          chmod 700 "$XDG_RUNTIME_DIR"
          dbus-run-session -- make check TESTS="check_ui_consistency check_workflows.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build Arch package
        if: steps.version.outputs.is_release == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          sed "s/@PACKAGE_VERSION@/${version}/g" \
            packaging/arch/PKGBUILD.in > PKGBUILD
          useradd -m builder
          chown -R builder: .
          su builder -c "makepkg -f --noconfirm --nodeps --noextract --noprepare"
          cp gnomint-*.pkg.tar.zst /tmp/
          chown root: /tmp/gnomint-*.pkg.tar.zst

      - name: Move Arch package
        if: steps.version.outputs.is_release == 'true'
        run: cp /tmp/gnomint-*.pkg.tar.zst .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-arch
          path: gnomint-*.pkg.tar.zst

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-arch
          path: |
            tests/*.log
            tests/test-suite.log

  # ── macOS (Homebrew) ──────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          brew install \
            autoconf automake libtool pkg-config \
            gtk4 glib \
            gnutls libgcrypt \
            sqlite readline \
            gdk-pixbuf \
            gettext intltool iso-codes

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix readline)/lib/pkgconfig:$(brew --prefix libgpg-error)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LDFLAGS="-L$(brew --prefix readline)/lib -L$(brew --prefix gettext)/lib -L$(brew --prefix libgpg-error)/lib ${LDFLAGS:-}"
          export CPPFLAGS="-I$(brew --prefix readline)/include -I$(brew --prefix gettext)/include -I$(brew --prefix libgpg-error)/include ${CPPFLAGS:-}"
          ./configure

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Install
        run: sudo make install

      - name: Run CLI tests
        run: |
          export GSETTINGS_SCHEMA_DIR=/usr/local/share/glib-2.0/schemas
          make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build DMG
        if: steps.version.outputs.is_release == 'true'
        run: |
          version="${{ steps.version.outputs.version }}"
          app_dir="gnomint-${version}-macos"
          mkdir -p "${app_dir}/bin" "${app_dir}/share"
          cp /usr/local/bin/gnomint /usr/local/bin/gnomint-cli "${app_dir}/bin/"
          cp -R /usr/local/share/gnomint "${app_dir}/share/"
          cp -R /usr/local/share/applications "${app_dir}/share/" 2>/dev/null || true
          cp -R /usr/local/share/metainfo "${app_dir}/share/" 2>/dev/null || true
          cp -R /usr/local/share/locale "${app_dir}/share/" 2>/dev/null || true
          cp -R /usr/local/share/glib-2.0 "${app_dir}/share/" 2>/dev/null || true
          cp -R /usr/local/share/mime "${app_dir}/share/" 2>/dev/null || true
          hdiutil create -volname "gnoMint ${version}" \
            -srcfolder "${app_dir}" \
            -ov -format UDZO \
            "gnomint-${version}-macos-arm64.dmg"

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: gnomint-${{ steps.version.outputs.version }}-macos-arm64.dmg

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-macos
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Windows (MSYS2/MinGW) ────────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-iso-codes
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-adwaita-icon-theme
            make autoconf automake libtool
            intltool
            git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: NOCONFIGURE=1 ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make DESTDIR=/tmp/gnomint-inst install

      - name: Run CLI tests
        run: |
          glib-compile-schemas gconf/
          export GSETTINGS_SCHEMA_DIR="$(pwd)/gconf"
          make check check_PROGRAMS=check_y2k38 \
            TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh \
            check_cli_algorithms.sh check_cli_y2038.sh \
            check_cli_y2038_import.sh check_cli_y2038_backfill.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Collect files for installer
        run: |
          bash packaging/windows/collect-files.sh staging

      # Smoke-test the staged tree the way an end user runs it: a clean
      # PATH containing ONLY the bundled bin\ plus the Windows system
      # directories — never the MSYS2 /mingw64/bin — so the Windows loader
      # has to satisfy every DLL from our own bundle. This reproduces the
      # exact "MSI installs but won't run" failure from issue #91 in CI:
      # a missing DLL aborts the process at load time with a recognizable
      # NTSTATUS, which we treat as a hard failure. A bundle that launches
      # its window (and keeps running until we kill it) passes.
      - name: Smoke-test staged GUI bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Suppress the modal "cannot find DLL" / crash dialogs so a
          # broken bundle exits with a status code instead of hanging CI.
          $sysErr = 0x0001 -bor 0x0002   # SEM_FAILCRITICALERRORS | SEM_NOGPFAULTERRORBOX
          Add-Type -Namespace Win32 -Name Sem -MemberDefinition `
            '[System.Runtime.InteropServices.DllImport("kernel32.dll")] public static extern uint SetErrorMode(uint mode);'
          [Win32.Sem]::SetErrorMode($sysErr) | Out-Null

          $staging = Resolve-Path staging
          $bin = Join-Path $staging 'bin'
          $exe = Join-Path $bin 'gnomint.exe'
          if (-not (Test-Path $exe)) { throw "staged gnomint.exe not found at $exe" }

          # End-user-equivalent environment: bundled bin only, no MSYS2.
          $env:PATH = "$bin;$env:SystemRoot\System32;$env:SystemRoot"
          $env:GSETTINGS_SCHEMA_DIR = Join-Path $staging 'share\glib-2.0\schemas'

          # NTSTATUS codes that mean "the binary could not be loaded/run"
          # — i.e. a missing or incompatible DLL (issue #91). Compared as
          # unsigned because ExitCode is a signed int32.
          $loadFailures = @{
            0xC0000135 = 'STATUS_DLL_NOT_FOUND';
            0xC0000139 = 'STATUS_ENTRYPOINT_NOT_FOUND';
            0xC000007B = 'STATUS_INVALID_IMAGE_FORMAT';
            0xC0000142 = 'STATUS_DLL_INIT_FAILED';
          }

          # gnomint.exe is a console-subsystem MinGW binary, so capture
          # its stdout/stderr — GTK/GLib print the actual reason (missing
          # schema, failed module load, "cannot open display", …) there.
          $out = Join-Path $env:RUNNER_TEMP 'gnomint-smoke.out'
          $err = Join-Path $env:RUNNER_TEMP 'gnomint-smoke.err'
          $p = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden `
                 -RedirectStandardOutput $out -RedirectStandardError $err
          $exited = $p.WaitForExit(15000)

          Write-Host "----- gnomint.exe stdout -----"
          if (Test-Path $out) { Get-Content $out | Write-Host }
          Write-Host "----- gnomint.exe stderr -----"
          if (Test-Path $err) { Get-Content $err | Write-Host }
          Write-Host "------------------------------"

          if (-not $exited) {
            # Still alive after 15s => GTK initialised and the window is
            # up, which means every load-time DLL resolved. That's a pass.
            $p.Kill(); $p.WaitForExit()
            Write-Host "PASS: gnomint.exe launched and stayed running; DLL bundle is complete."
            exit 0
          }

          $code = $p.ExitCode
          $ucode = [uint32]($code -band 0xFFFFFFFF)
          if ($loadFailures.ContainsKey([int64]$ucode)) {
            $name = $loadFailures[[int64]$ucode]
            Write-Error ("FAIL: gnomint.exe could not start (0x{0:X8} {1}). The bundle is missing a DLL — see issue #91." -f $ucode, $name)
            exit 1
          }
          if ($code -eq 0) {
            Write-Host "PASS: gnomint.exe exited cleanly (code 0)."
            exit 0
          }
          # Any other early non-zero exit is most likely the CI runner's
          # display environment, not a bundling defect. Surface it loudly
          # (with the captured output above) but don't fail the build yet.
          Write-Warning ("gnomint.exe exited early with code 0x{0:X8} ({1}). See captured output above." -f $ucode, $code)

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          & wix build -arch x64 `
            -d ProductVersion=$version `
            -o "gnomint-${{ steps.version.outputs.version }}.msi" `
            packaging/windows/Package.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: gnomint-${{ steps.version.outputs.version }}.msi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Upload binaries to GitHub Release ────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fedora, debian, arch, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" ./* --clobber

  # ── Notify when a PR run recovers (red → green) ───────────────────
  # GitHub Actions has no native "back to green" notification — the account
  # setting only notifies on failures. This job posts a PR comment when a
  # pull-request run succeeds after the previous run on the same branch failed.
  # It depends on every build job, so GitHub skips it automatically if any of
  # them fail (i.e. it only runs when THIS run is green); it then comments only
  # when the PREVIOUS run failed, so it fires exactly on the failure→success
  # transition and never on routine green runs. Uses the built-in token — no
  # secrets, no account settings.
  notify-recovery:
    name: Notify on PR run recovery
    needs: [fedora, debian, arch, i386, macos, windows]
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Comment if this run recovered a previous failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          WF: ${{ github.workflow }}
        run: |
          # Conclusion of the most recent COMPLETED pull_request run for this
          # branch, excluding the current run.
          prev=$(gh run list --repo "$GH_REPO" \
                   --workflow "$WF" \
                   --branch "$HEAD_REF" \
                   --event pull_request \
                   --limit 20 \
                   --json databaseId,status,conclusion \
                   -q "[.[] | select((.databaseId|tostring) != \"$RUN_ID\" and .status == \"completed\")][0].conclusion")
          echo "Previous completed run conclusion: ${prev:-none}"
          case "$prev" in
            failure|timed_out|startup_failure)
              gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
                --body "✅ CI recovered — **$WF** is back to green on \`$HEAD_REF\` ([run #$RUN_ID]($SERVER_URL/$GH_REPO/actions/runs/$RUN_ID))."
              echo "Posted recovery comment on PR #$PR_NUMBER"
              ;;
            *)
              echo "No prior failure to recover from — not commenting."
              ;;
          esac
