name: Multi-platform Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:

  # ── Fedora (latest) ───────────────────────────────────────────────
  fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc make autoconf automake libtool pkgconf-pkg-config \
            gtk4-devel glib2-devel \
            gnutls-devel gnutls-utils openssl \
            sqlite-devel libgcrypt-devel readline-devel \
            gdk-pixbuf2-devel \
            gettext-devel intltool iso-codes-devel \
            weston dbus-daemon dbus-tools git \
            rpm-build tar gzip

      - name: Set up D-Bus machine-id
        run: dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make install

      - name: Run CLI tests
        run: |
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Run GUI workflow tests (headless Wayland)
        run: |
          dbus-run-session -- make check TESTS="check_ui_consistency check_workflows.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build source tarball
        if: steps.version.outputs.is_release == 'true'
        run: make dist

      - name: Build binary tarball
        if: steps.version.outputs.is_release == 'true'
        run: |
          make DESTDIR="$(pwd)/destdir" install
          tar czf "gnomint-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz" \
            -C destdir/usr/local .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-fedora
          path: |
            gnomint-${{ steps.version.outputs.version }}.tar.gz
            gnomint-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-fedora
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Arch Linux (rolling) ──────────────────────────────────────────
  arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            gcc make autoconf automake libtool pkgconf \
            gtk4 glib2 \
            gnutls openssl \
            sqlite libgcrypt readline \
            gdk-pixbuf2 \
            gettext intltool iso-codes \
            weston libdisplay-info dbus python git

      - name: Set up D-Bus machine-id
        run: dbus-uuidgen --ensure=/etc/machine-id

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make install

      - name: Run CLI tests
        run: |
          dbus-run-session -- make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Run GUI workflow tests (headless Wayland)
        run: |
          export XDG_RUNTIME_DIR=$(mktemp -d)
          chmod 700 "$XDG_RUNTIME_DIR"
          dbus-run-session -- make check TESTS="check_ui_consistency check_workflows.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build binary tarball
        if: steps.version.outputs.is_release == 'true'
        run: |
          make DESTDIR="$(pwd)/destdir" install
          tar czf "gnomint-${{ steps.version.outputs.version }}-arch-x86_64.tar.gz" \
            -C destdir/usr/local .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-arch
          path: gnomint-${{ steps.version.outputs.version }}-arch-x86_64.tar.gz

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-arch
          path: |
            tests/*.log
            tests/test-suite.log

  # ── macOS (Homebrew) ──────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          brew install \
            autoconf automake libtool pkg-config \
            gtk4 glib \
            gnutls libgcrypt \
            sqlite readline \
            gdk-pixbuf \
            gettext intltool iso-codes

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix readline)/lib/pkgconfig:$(brew --prefix libgpg-error)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LDFLAGS="-L$(brew --prefix readline)/lib -L$(brew --prefix gettext)/lib -L$(brew --prefix libgpg-error)/lib ${LDFLAGS:-}"
          export CPPFLAGS="-I$(brew --prefix readline)/include -I$(brew --prefix gettext)/include -I$(brew --prefix libgpg-error)/include ${CPPFLAGS:-}"
          ./configure

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Install
        run: sudo make install

      - name: Run CLI tests
        run: |
          export GSETTINGS_SCHEMA_DIR=/usr/local/share/glib-2.0/schemas
          make check TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh check_cli_passphrase.py \
            check_cli_algorithms.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Build binary tarball
        if: steps.version.outputs.is_release == 'true'
        run: |
          sudo make DESTDIR="$(pwd)/destdir" install
          tar czf "gnomint-${{ steps.version.outputs.version }}-macos-arm64.tar.gz" \
            -C destdir/usr/local .

      - name: Upload release artifacts
        if: steps.version.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: gnomint-${{ steps.version.outputs.version }}-macos-arm64.tar.gz

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-macos
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Windows (MSYS2/MinGW) ────────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-iso-codes
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-adwaita-icon-theme
            make autoconf automake libtool
            intltool
            git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            version=$(grep AC_INIT configure.ac | sed 's/.*\[\([0-9.]*\)\].*/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build configuration
        run: NOCONFIGURE=1 ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install
        run: make DESTDIR=/tmp/gnomint-inst install

      - name: Run CLI tests
        run: |
          glib-compile-schemas gconf/
          export GSETTINGS_SCHEMA_DIR="$(pwd)/gconf"
          make check check_PROGRAMS=check_y2k38 \
            TESTS="check_y2k38 \
            check_cli_email.sh check_cli_wizard.sh check_cli_parity.sh \
            check_cli_info.sh check_cli_lifecycle.sh \
            check_cli_keys.sh check_cli_banner.sh check_cli_import.sh \
            check_cli_importdir.sh check_cli_dhgen.sh \
            check_cli_algorithms.sh" \
          || (cat tests/test-suite.log; exit 1)

      - name: Collect files for installer
        run: |
          bash packaging/windows/collect-files.sh staging

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          & wix build -arch x64 `
            -d ProductVersion=$version `
            -o "gnomint-${{ steps.version.outputs.version }}.msi" `
            packaging/windows/Package.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: gnomint-${{ steps.version.outputs.version }}.msi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows
          path: |
            tests/*.log
            tests/test-suite.log

  # ── Upload binaries to GitHub Release ────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fedora, arch, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" ./* --clobber
