name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make \
            autoconf automake libtool pkg-config \
            libgtk-4-dev libglib2.0-dev \
            libgnutls28-dev gnutls-bin \
            libsqlite3-dev libgcrypt20-dev libreadline-dev \
            libgdk-pixbuf2.0-dev \
            gettext intltool iso-codes \
            weston mutter \
            python3-gi gir1.2-atspi-2.0 at-spi2-core dbus-x11 \
            xserver-xorg-core xserver-xorg-video-dummy \
            xserver-xorg-input-libinput x11-xserver-utils

      - name: Generate build configuration
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Install (needed for UI file tests)
        run: sudo make install

      - name: Run test suite
        run: make check

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests/*.log
