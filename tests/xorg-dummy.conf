# xorg-dummy.conf — headless Xorg config for GUI tests.
#
# Uses xf86-video-dummy for output and the inputtest driver for
# keyboard/pointer input. The inputtest driver creates proper XI2
# slave devices and accepts events over Unix sockets, providing
# the real input pipeline that GTK 4 requires.

Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "AllowMouseOpenFail" "true"
    Option "PciForceNone" "true"
    Option "AutoEnableDevices" "false"
    Option "AutoAddDevices" "false"
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
    InputDevice "TestKeyboard" "SendCoreEvents"
    InputDevice "TestPointer" "SendCoreEvents"
EndSection

Section "InputDevice"
    Identifier "TestKeyboard"
    Driver     "inputtest"
    Option     "SocketPath" "/tmp/gnomint-test-kbd.sock"
    Option     "DeviceType" "Keyboard"
EndSection

Section "InputDevice"
    Identifier "TestPointer"
    Driver     "inputtest"
    Option     "SocketPath" "/tmp/gnomint-test-ptr.sock"
    Option     "DeviceType" "PointerAbsolute"
EndSection

Section "Device"
    Identifier "Dummy0"
    Driver     "dummy"
    VideoRam   256000
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync   28.0-80.0
    VertRefresh  48.0-75.0
    Modeline "1280x1200_60.00" 112.63 1280 1364 1496 1712 1200 1201 1204 1240 -HSync +VSync
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Dummy0"
    Monitor    "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1280x1200"
    EndSubSection
EndSection
